textarea#inp:focus{border-color:var(--sage)}
textarea#inp::placeholder{color:var(--muted)}
#send-btn{width:44px;height:44px;background:linear-gradient(135deg,var(--sage),var(--sage-d));border:none;border-radius:11px;cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;flex-shrink:0}

<body>

<!-- Setup form -->
<div id="setup">
  <h2>🌿 ברוכים הבאים — בואו נכיר את העסק שלכם</h2>

</div>

      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>

  </div>

<script>
const API_KEY = typeof process !== 'undefined' && process.env ? process.env.ANTHROPIC_API_KEY : window.ANTHROPIC_API_KEY;
let client = null;
let history = [];
let pendingImage = null;
let setupOpen = true;

function toggleSetup() {
  setupOpen = !setupOpen;
  document.getElementById('setup').style.display = setupOpen ? 'block' : 'none';
}

function saveClient() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('נא להזין שם עסק'); return; }
  client = {
    name,
    type: document.getElementById('f-type').value,
    audience: document.getElementById('f-audience').value,
    tone: document.getElementById('f-tone').value,
    networks: document.getElementById('f-networks').value,
    red: document.getElementById('f-red').value,
    magic: document.getElementById('f-magic').value,
    goals: document.getElementById('f-goals').value
  };
  document.getElementById('setup').style.display = 'none';
  document.getElementById('banner').style.display = 'flex';
  document.getElementById('banner-txt').textContent = `${name} | ${client.type}`;
  document.getElementById('chips').style.display = 'flex';
  document.getElementById('upload-area').style.display = 'flex';
  document.getElementById('header-title').textContent = `העוזר השיווקי — ${name}`;
  setupOpen = false;
  history = [];
  document.getElementById('chat').innerHTML = '';
  appendMsg(`היי! אני העוזר השיווקי של **${name}** 🌿\n\nאני מכיר את העסק שלך ומוכן לעזור עם תוכן מותאם אישית.\n\nאפשר לשאול אותי כל שאלה, להשתמש בכפתורים למעלה, או להעלות תמונה לניתוח 👆`, 'bot');
}

function buildPrompt() {
  const today = new Date().toLocaleDateString('he-IL', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  return `אתה עוזר שיווקי חכם ואנושי של סוכנות "היענטא דיגיטאל אגענסי".
היום: ${today}.

פרטי העסק:
- שם: ${client.name}
- סוג: ${client.type}
- קהל יעד: ${client.audience}
- טון: ${client.tone}
- רשתות: ${client.networks}
- קווים אדומים: ${client.red || 'לא צוין'}
- מה הלקוחות אוהבים: ${client.magic || 'לא צוין'}
- מטרות: ${client.goals || 'לא צוין'}

כללים:
1. טון אנושי לחלוטין — חמים, ישראלי, לא רובוטי
2. תמיד התאם למצב בישראל — מלחמה, חגים, אירועים — הטון חייב להשתנות
3. אם הלקוח לא מרוצה — תתאים מיד, אל תחזור על אותו דבר
4. הצע תמיד 2-3 אפשרויות שונות
5. כתוב תמיד בעברית, בגוף נקבה
6. כשמנתח תמונה/פוסט — ציין מה עבד, למה, ותן 3 רעיונות דומים
7. שלב האשטגים רלוונטיים בסוף כיתובים
8. CTA — תמיד הוסף קריאה לפעולה ברורה`;
}

function analyzePost() {
  document.getElementById('file-input').click();
  appendMsg('העלי תמונה או סקרינשוט של הפוסט שעבד טוב — אנתח מה עבד ולמה 🔍', 'bot');
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImage = { data: e.target.result.split(',')[1], type: file.type };
    document.getElementById('file-preview').textContent = `✅ ${file.name} — מוכן לניתוח`;
  };
  reader.readAsDataURL(file);
}

function q(text) {
  document.getElementById('inp').value = text;
  send();
}

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !pendingImage) return;
  if (!client) { toggleSetup(); return; }

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  setStatus('מחפש ומעבד...', true);

  let userContent;
  if (pendingImage) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: pendingImage.type, data: pendingImage.data } },
      { type: 'text', text: text || 'נתחי את הפוסט הזה — מה עבד, למה, ותני 3 רעיונות דומים' }
    ];
    appendMsg('📎 ' + (text || 'נתחי את הפוסט'), 'user');
    pendingImage = null;
    document.getElementById('file-preview').textContent = 'העלי תמונה / סקרינשוט לניתוח (אופציונלי)';
    document.getElementById('file-input').value = '';
  } else {
    userContent = text;
    appendMsg(text, 'user');
  }

  history.push({ role: 'user', content: userContent });
  const loadId = appendLoading();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: buildPrompt(),
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: history
      })
    });

    const data = await res.json();
    const searched = data.content?.some(b => b.type === 'tool_use' && b.name === 'web_search');
    const reply = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || 'משהו השתבש, נסי שוב 🙏';

    removeLoading(loadId);
    history.push({ role: 'assistant', content: reply });
    appendMsg(reply, 'bot', searched);
  } catch(e) {
    removeLoading(loadId);
    appendMsg('אופס, הייתה בעיה בחיבור. נסי שוב 🙏', 'bot');
  }

  setStatus('מוכן', false);
  document.getElementById('send-btn').disabled = false;
}

function setStatus(txt, busy) {
  document.getElementById('status-txt').textContent = txt;
  document.getElementById('dot').className = 'dot' + (busy ? ' busy' : '');
}

function appendMsg(text, who, searched=false) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  const av = document.createElement('div');
  av.className = `av ${who}`;
  av.textContent = who === 'bot' ? '🌿' : '👤';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${who}`;
  if (who === 'bot' && searched) {
    const b = document.createElement('div');
    b.className = 'search-badge';
    b.textContent = '🔍 בדקתי טרנדים עדכניים';
    bubble.appendChild(b);
    bubble.appendChild(document.createElement('br'));
  }
  const c = document.createElement('div');
  c.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  bubble.appendChild(c);
  div.appendChild(av);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

let lc = 0;
function appendLoading() {
  const id = 'l'+(++lc);
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className='msg';div.id=id;
  div.innerHTML=`<div class="av bot">🌿</div><div class="bubble bot"><div class="loading"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return id;
}
function removeLoading(id){const e=document.getElementById(id);if(e)e.remove()}
</script>
</body>
